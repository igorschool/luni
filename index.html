<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Задание 1: Помоги Луни</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(180deg, #e0f2fe 0%, #f0f9ff 100%);
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
        }
        .item-card {
            transition: all 0.2s;
            cursor: pointer;
        }
        .item-card.selected {
            border: 4px solid #3b82f6;
            transform: scale(1.05);
            background-color: #eff6ff;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
        }
        .drop-zone {
            transition: all 0.3s;
        }
        .drop-zone.active-target {
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }
        .luni-bubble {
            background: white;
            border-radius: 20px;
            padding: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .flying {
            position: fixed;
            z-index: 1000;
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }
        .overlay {
            position: fixed;
            inset: 0;
            background: white;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body class="h-screen flex flex-col p-4">

    <div id="start-screen" class="overlay">
        <div class="mb-6 w-40 h-40">
            <img src="2.png" alt="Луни" class="w-full h-full object-contain rounded-2xl" onerror="this.src='https://via.placeholder.com/150?text=Luni'">
        </div>
        <h2 class="text-2xl font-black text-slate-700 mb-6 text-center px-6">Поможешь Луни разложить покупки?</h2>
        <button onclick="initApp()" class="bg-blue-600 text-white font-bold py-4 px-10 rounded-2xl text-xl shadow-lg active:scale-95 transition">Да, давай!</button>
    </div>

    <div class="max-w-4xl mx-auto w-full flex items-start justify-between mb-4">
        <div class="flex-1 mr-4">
            <h1 class="text-2xl font-black text-blue-600 mb-1">Задание №1</h1>
            <div class="luni-bubble text-sm md:text-base font-bold text-gray-700">
                Нажми на предмет, а потом — куда его положить!
            </div>
        </div>
        <div class="w-20 h-20 md:w-28 md:h-28">
            <img src="2.png" alt="Луни" class="w-full h-full object-contain">
        </div>
    </div>

    <div id="items-container" class="max-w-4xl mx-auto w-full bg-white/80 backdrop-blur rounded-3xl p-4 shadow-inner grid grid-cols-2 md:grid-cols-4 gap-3 mb-6 min-h-[200px]"></div>

    <div class="max-w-4xl mx-auto w-full grid grid-cols-2 gap-4 flex-1 mb-4">
        <div id="basket" onclick="handleZoneClick('food')" class="drop-zone flex flex-col items-center justify-center p-4 rounded-3xl bg-blue-100 border-4 border-blue-200 h-full relative">
            <span class="text-xs font-black text-blue-500 uppercase mb-1">Съедобное</span>
            <div class="text-6xl mb-2">🧺</div>
            <div id="basket-content" class="flex flex-wrap justify-center gap-1"></div>
        </div>
        <div id="box" onclick="handleZoneClick('cleaning')" class="drop-zone flex flex-col items-center justify-center p-4 rounded-3xl bg-orange-100 border-4 border-orange-200 h-full relative">
            <span class="text-xs font-black text-orange-500 uppercase mb-1">Несъедобное</span>
            <div class="text-6xl mb-2">📦</div>
            <div id="box-content" class="flex flex-wrap justify-center gap-1"></div>
        </div>
    </div>

    <div id="success-modal" class="fixed inset-0 bg-black/40 hidden flex items-center justify-center z-50 p-6">
        <div class="bg-white rounded-3xl p-8 max-w-xs w-full text-center shadow-2xl">
            <div class="text-6xl mb-4">✨</div>
            <h2 class="text-2xl font-black text-blue-600 mb-2">Здорово!</h2>
            <p class="text-gray-500 mb-6">Все вещи на своих местах!</p>
            <button onclick="location.reload()" class="bg-blue-600 text-white font-bold py-3 px-8 rounded-full shadow-lg">Еще раз</button>
        </div>
    </div>

    <script>
        const itemsData = [
            { name: 'Яблоко', icon: '🍎', type: 'food' },
            { name: 'Губка', icon: '🧽', type: 'cleaning' },
            { name: 'Банан', icon: '🍌', type: 'food' },
            { name: 'Молоко', icon: '🥛', type: 'food' },
            { name: 'Мыло', icon: '🧼', type: 'cleaning' },
            { name: 'Спрей', icon: '🧴', type: 'cleaning' },
            { name: 'Щетка', icon: '🧹', type: 'cleaning' },
            { name: 'Хлеб', icon: '🍞', type: 'food' }
        ];

        let selectedItem = null;
        let score = 0;

        function initApp() {
            document.getElementById('start-screen').classList.add('hidden');
            renderItems();
        }

        function renderItems() {
            const container = document.getElementById('items-container');
            container.innerHTML = '';
            itemsData.forEach((item, index) => {
                const el = document.createElement('div');
                el.className = 'item-card bg-white rounded-2xl shadow-sm border border-slate-100 flex flex-col items-center justify-center p-2 h-24 md:h-28';
                el.id = 'item-' + index;
                el.innerHTML = `<div class="text-4xl md:text-5xl mb-1">${item.icon}</div><div class="text-[10px] font-black text-slate-400 uppercase">${item.name}</div>`;
                el.onclick = () => selectItem(el, item);
                container.appendChild(el);
            });
        }

        function selectItem(element, data) {
            // Снимаем выделение с прошлого
            document.querySelectorAll('.item-card').forEach(card => card.classList.remove('selected'));
            document.querySelectorAll('.drop-zone').forEach(zone => zone.classList.remove('active-target'));
            
            selectedItem = { element, data };
            element.classList.add('selected');
            
            // Подсвечиваем зоны, чтобы ребенок знал, что делать дальше
            document.querySelectorAll('.drop-zone').forEach(zone => zone.classList.add('active-target'));
        }

        function handleZoneClick(zoneType) {
            if (!selectedItem) return;

            const targetZoneId = zoneType === 'food' ? 'basket' : 'box';
            const targetZone = document.getElementById(targetZoneId);

            if (selectedItem.data.type === zoneType) {
                // ПРАВИЛЬНО: запускаем анимацию полета
                flyToTarget(selectedItem.element, targetZone);
            } else {
                // ОШИБКА: трясем предмет
                selectedItem.element.classList.add('animate-bounce');
                setTimeout(() => selectedItem.element.classList.remove('animate-bounce'), 500);
            }
        }

        function flyToTarget(itemEl, zoneEl) {
            const rect = itemEl.getBoundingClientRect();
            const zoneRect = zoneEl.getBoundingClientRect();

            // Создаем копию для анимации полета
            const flyer = itemEl.cloneNode(true);
            flyer.classList.remove('selected', 'item-card');
            flyer.classList.add('flying');
            flyer.style.left = rect.left + 'px';
            flyer.style.top = rect.top + 'px';
            flyer.style.width = rect.width + 'px';
            document.body.appendChild(flyer);

            // Скрываем оригинал
            itemEl.style.visibility = 'hidden';
            itemEl.onclick = null;

            // Через мгновение запускаем полет в центр зоны
            setTimeout(() => {
                flyer.style.left = (zoneRect.left + zoneRect.width / 2 - rect.width / 2) + 'px';
                flyer.style.top = (zoneRect.top + zoneRect.height / 2 - rect.height / 2) + 'px';
                flyer.style.transform = 'scale(0.2)';
                flyer.style.opacity = '0';
            }, 10);

            // Убираем элементы и обновляем счет
            setTimeout(() => {
                flyer.remove();
                const content = document.getElementById(zoneEl.id + '-content');
                const miniIcon = document.createElement('div');
                miniIcon.className = 'text-2xl';
                miniIcon.textContent = selectedItem.data.icon;
                content.appendChild(miniIcon);
                
                selectedItem = null;
                document.querySelectorAll('.drop-zone').forEach(z => z.classList.remove('active-target'));
                
                score++;
                if (score === itemsData.length) {
                    document.getElementById('success-modal').classList.remove('hidden');
                }
            }, 600);
        }
    </script>
</body>
</html>
