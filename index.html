<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Задание 1: Помоги Луни</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }

        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(180deg, #e0f2fe 0%, #f0f9ff 100%);
            touch-action: none;
            overflow: hidden;
            height: 100dvh;
            width: 100vw;
            margin: 0;
            padding: 0;
        }

        /* ── Основная обёртка ── */
        #app-shell {
            display: flex;
            flex-direction: column;
            height: 100dvh;
            width: 100%;
            padding: env(safe-area-inset-top, 8px) env(safe-area-inset-right, 8px) env(safe-area-inset-bottom, 8px) env(safe-area-inset-left, 8px);
        }

        /* ── Шапка ── */
        #header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 8px;
            flex-shrink: 0;
            padding: 8px 8px 4px;
        }

        #luni-bot {
            flex-shrink: 0;
            cursor: pointer;
        }

        .luni-bubble {
            position: relative;
            background: white;
            border-radius: 20px;
            padding: 10px 14px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            font-size: clamp(11px, 2.5vw, 15px);
            font-weight: 700;
            color: #374151;
            line-height: 1.4;
        }

        /* ── Контейнер предметов ── */
        #items-container {
            display: grid;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            padding: 10px;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.06);
            flex-shrink: 0;
            margin: 0 8px;
        }

        /* ── Зоны сброса ── */
        #drop-zones {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            flex: 1 1 auto;
            min-height: 0;
            padding: 4px 8px 8px;
        }

        .drop-zone {
            transition: all 0.3s;
            border: 4px dashed transparent;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            min-height: 0;
        }

        .drop-zone.active {
            border-color: #3b82f6;
            background-color: rgba(59, 130, 246, 0.1);
            transform: scale(1.02);
        }

        .zone-label {
            font-size: clamp(9px, 2vw, 12px);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 4px;
        }

        .zone-icon {
            font-size: clamp(32px, 6vw, 52px);
            line-height: 1;
            margin-bottom: 4px;
        }

        .zone-content {
            position: absolute;
            inset: 0;
            pointer-events: none;
            display: flex;
            flex-wrap: wrap;
            align-content: flex-end;
            justify-content: center;
            padding: 6px;
            gap: 2px;
        }

        /* ── Карточки предметов ── */
        .drag-item {
            cursor: grab;
            user-select: none;
            touch-action: none;
            background: white;
            border-radius: 16px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
            border: 1px solid #f1f5f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: transform 0.15s, box-shadow 0.15s;
        }

        .drag-item:active { transform: scale(1.06); box-shadow: 0 6px 18px rgba(0,0,0,0.14); }

        .drag-item .item-icon { line-height: 1; }
        .drag-item .item-name {
            font-size: clamp(8px, 1.8vw, 11px);
            font-weight: 900;
            color: #94a3b8;
            text-transform: uppercase;
            margin-top: 2px;
        }

        /* ── Аватар Луни ── */
        .luni-avatar { width: 100%; height: 100%; object-fit: contain; border-radius: 1rem; }

        .float-anim { animation: float 3s ease-in-out infinite; }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50%       { transform: translateY(-8px); }
        }

        /* ── Оверлей ── */
        .overlay {
            position: fixed;
            inset: 0;
            background: white;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        /* ── Модал успеха ── */
        #success-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 50;
            padding: 24px;
        }
        #success-modal.show { display: flex; }

        /* ══════════════════════════════════════════
           PORTRAIT PHONE  (≤ 480px wide)
        ══════════════════════════════════════════ */
        @media (max-width: 480px) and (orientation: portrait) {
            #luni-bot { width: 72px; height: 72px; }
            #items-container { grid-template-columns: repeat(4, 1fr); gap: 6px; }
            .drag-item { height: 72px; }
            .drag-item .item-icon { font-size: 28px; }
        }

        /* ══════════════════════════════════════════
           LANDSCAPE PHONE  (height ≤ 480px)
        ══════════════════════════════════════════ */
        @media (max-height: 480px) and (orientation: landscape) {
            #header { padding: 4px 8px 2px; }
            #luni-bot { width: 52px; height: 52px; }
            .luni-bubble { padding: 6px 10px; }
            #items-container {
                grid-template-columns: repeat(8, 1fr);
                gap: 4px;
                padding: 6px;
            }
            .drag-item { height: 56px; }
            .drag-item .item-icon { font-size: 22px; }
            .drag-item .item-name { display: none; }
            #drop-zones { gap: 6px; padding: 2px 8px 6px; }
            .zone-icon { font-size: 26px; }
            .zone-label { font-size: 9px; }
        }

        /* ══════════════════════════════════════════
           TABLET PORTRAIT  (481px – 1024px, portrait)
        ══════════════════════════════════════════ */
        @media (min-width: 481px) and (max-width: 1024px) and (orientation: portrait) {
            #luni-bot { width: 100px; height: 100px; }
            #items-container { grid-template-columns: repeat(4, 1fr); gap: 10px; }
            .drag-item { height: 110px; }
            .drag-item .item-icon { font-size: 44px; }
            .drag-item .item-name { font-size: 11px; }
            .zone-icon { font-size: 52px; }
        }

        /* ══════════════════════════════════════════
           TABLET LANDSCAPE  (481px – 1024px, landscape)
        ══════════════════════════════════════════ */
        @media (min-width: 481px) and (max-width: 1024px) and (orientation: landscape) {
            #app-shell { flex-direction: row; flex-wrap: wrap; }

            /* Левая колонка: шапка + предметы */
            #left-col {
                display: flex;
                flex-direction: column;
                flex: 1 1 55%;
                height: 100%;
                min-width: 0;
            }

            /* Правая колонка: зоны */
            #drop-zones {
                flex: 1 1 40%;
                height: 100%;
                padding: 8px;
                grid-template-columns: 1fr 1fr;
                grid-template-rows: 1fr;
            }

            #luni-bot { width: 80px; height: 80px; }
            #items-container {
                grid-template-columns: repeat(4, 1fr);
                gap: 8px;
                flex: 1;
                align-content: center;
            }
            .drag-item { height: 90px; }
            .drag-item .item-icon { font-size: 36px; }
        }

        /* ══════════════════════════════════════════
           DESKTOP  (> 1024px)
        ══════════════════════════════════════════ */
        @media (min-width: 1025px) {
            #app-shell { max-width: 900px; margin: 0 auto; }
            #luni-bot { width: 120px; height: 120px; }
            #items-container { grid-template-columns: repeat(4, 1fr); gap: 12px; }
            .drag-item { height: 120px; }
            .drag-item .item-icon { font-size: 52px; }
            .drag-item .item-name { font-size: 11px; }
        }

        /* Default grid fallback (portrait phones 320-480) */
        #items-container { grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .drag-item { height: 80px; }
        .drag-item .item-icon { font-size: 32px; }
    </style>
</head>
<body>

    <!-- Стартовый экран -->
    <div id="start-screen" class="overlay">
        <div class="mb-6" style="width:clamp(100px,30vw,160px);height:clamp(100px,30vw,160px)">
            <img src="2.png" alt="Аватар Луни" class="luni-avatar" onerror="this.src='https://via.placeholder.com/150?text=Luni'">
        </div>
        <h2 class="text-2xl font-black text-slate-700 mb-6 text-center px-6">Готов помочь Луни?</h2>
        <div class="flex flex-col gap-3 w-full" style="max-width:280px">
            <button onclick="initApp(true)"  class="bg-blue-600 text-white font-bold py-4 rounded-2xl text-xl shadow-lg active:scale-95 transition">🔊 Играть со звуком</button>
            <button onclick="initApp(false)" class="bg-slate-200 text-slate-600 font-bold py-4 rounded-2xl text-xl active:scale-95 transition">🔇 Без звука</button>
        </div>
    </div>

    <!-- Основной интерфейс -->
    <div id="app-shell">

        <!-- Левая колонка (только в landscape-tablet используется явно) -->
        <div id="left-col" style="display:contents">

            <!-- Шапка -->
            <div id="header">
                <div style="flex:1;min-width:0">
                    <h1 class="font-black text-blue-600 mb-1" style="font-size:clamp(16px,4vw,24px)">Задание №1</h1>
                    <div class="luni-bubble">
                        Распредели покупки!<br>
                        <span class="text-blue-500">Съедобное</span> — в корзину,
                        <span class="text-orange-500">Несъедобное</span> — в коробку!
                    </div>
                </div>
                <div id="luni-bot" class="float-anim" onclick="playAudio()">
                    <img src="2.png" alt="Аватар Луни" class="luni-avatar"
                         onerror="this.src='https://via.placeholder.com/150?text=Luni'">
                </div>
            </div>

            <!-- Предметы -->
            <div id="items-container"></div>

        </div><!-- /left-col -->

        <!-- Зоны сброса -->
        <div id="drop-zones">
            <div id="basket" class="drop-zone bg-blue-50 border-2 border-blue-100" data-type="food">
                <span class="zone-label text-blue-400">Съедобное</span>
                <div class="zone-icon">🧺</div>
                <div id="basket-content" class="zone-content"></div>
            </div>
            <div id="box" class="drop-zone bg-orange-50 border-2 border-orange-100" data-type="cleaning">
                <span class="zone-label text-orange-400">Несъедобное</span>
                <div class="zone-icon">📦</div>
                <div id="box-content" class="zone-content"></div>
            </div>
        </div>

    </div><!-- /app-shell -->

    <!-- Окно успеха -->
    <div id="success-modal" class="fixed inset-0 bg-black/40 items-center justify-center z-50 p-6" style="display:none">
        <div class="bg-white rounded-3xl p-8 w-full text-center shadow-2xl" style="max-width:320px">
            <div class="text-6xl mb-4">✨</div>
            <h2 class="text-2xl font-black text-blue-600 mb-2">Молодец!</h2>
            <p class="text-gray-500 mb-6">Ты отличный помощник!</p>
            <button onclick="location.reload()" class="bg-blue-600 text-white font-bold py-3 px-8 rounded-full shadow-lg">Играть еще раз</button>
        </div>
    </div>

    <script>
        const AUDIO_FILE_NAME = '1.mp3';
        let gameAudio = null;
        let useSound = false;
        let score = 0;

        const itemsData = [
            { name: 'Яблоко', icon: '🍎', type: 'food' },
            { name: 'Губка',  icon: '🧽', type: 'cleaning' },
            { name: 'Банан',  icon: '🍌', type: 'food' },
            { name: 'Молоко', icon: '🥛', type: 'food' },
            { name: 'Мыло',   icon: '🧼', type: 'cleaning' },
            { name: 'Спрей',  icon: '🧴', type: 'cleaning' },
            { name: 'Щетка',  icon: '🧹', type: 'cleaning' },
            { name: 'Хлеб',   icon: '🍞', type: 'food' }
        ];

        function initApp(sound) {
            useSound = sound;
            document.getElementById('start-screen').classList.add('hidden');

            if (sound) {
                gameAudio = new Audio(AUDIO_FILE_NAME);
                gameAudio.onerror = () => console.error('Аудиофайл 1.mp3 не найден.');
            }

            renderItems();
            applyLayout();
            if (useSound) playAudio();
        }

        function playAudio() {
            if (gameAudio) {
                gameAudio.currentTime = 0;
                gameAudio.play().catch(() => {});
            }
        }

        function renderItems() {
            const container = document.getElementById('items-container');
            container.innerHTML = '';
            itemsData.forEach(item => {
                const el = document.createElement('div');
                el.className = 'drag-item';
                el.draggable = true;
                el.dataset.name = item.name;
                el.dataset.type = item.type;
                el.innerHTML = `<div class="item-icon">${item.icon}</div><div class="item-name">${item.name}</div>`;

                el.ontouchstart = handleTouchStart;
                el.ontouchmove  = handleTouchMove;
                el.ontouchend   = handleTouchEnd;

                el.ondragstart = e => { e.dataTransfer.setData('text', item.name); el.classList.add('opacity-40'); };
                el.ondragend   = () => el.classList.remove('opacity-40');
                container.appendChild(el);
            });
        }

        /* ── Tablet-landscape layout switch ── */
        function applyLayout() {
            const leftCol = document.getElementById('left-col');
            const isTabletLandscape = window.innerWidth > 480 && window.innerWidth <= 1024 && window.innerWidth > window.innerHeight;

            if (isTabletLandscape) {
                leftCol.style.display = 'flex';
                leftCol.style.flexDirection = 'column';
                leftCol.style.flex = '1 1 55%';
                leftCol.style.height = '100%';
                leftCol.style.minWidth = '0';
            } else {
                leftCol.style.display = 'contents';
            }
        }

        window.addEventListener('resize', applyLayout);
        window.addEventListener('orientationchange', () => setTimeout(applyLayout, 100));

        /* ── Touch drag ── */
        let curDrag = null;
        let origParent = null;
        let origNext = null;

        function handleTouchStart(e) {
            curDrag = e.currentTarget;
            origParent = curDrag.parentNode;
            origNext   = curDrag.nextSibling;

            const rect = curDrag.getBoundingClientRect();
            curDrag.style.position = 'fixed';
            curDrag.style.zIndex   = '1000';
            curDrag.style.width    = rect.width + 'px';
            curDrag.style.height   = rect.height + 'px';
            curDrag.style.opacity  = '0.85';
            moveAt(e.touches[0].clientX, e.touches[0].clientY, rect.width, rect.height);
        }

        function handleTouchMove(e) {
            if (!curDrag) return;
            e.preventDefault();
            const rect = { width: parseFloat(curDrag.style.width), height: parseFloat(curDrag.style.height) };
            moveAt(e.touches[0].clientX, e.touches[0].clientY, rect.width, rect.height);

            document.querySelectorAll('.drop-zone').forEach(z => z.classList.remove('active'));
            const zone = document.elementFromPoint(e.touches[0].clientX, e.touches[0].clientY)?.closest('.drop-zone');
            if (zone) zone.classList.add('active');
        }

        function handleTouchEnd(e) {
            if (!curDrag) return;
            document.querySelectorAll('.drop-zone').forEach(z => z.classList.remove('active'));

            const t = e.changedTouches[0];
            const zone = document.elementFromPoint(t.clientX, t.clientY)?.closest('.drop-zone');

            if (zone && zone.dataset.type === curDrag.dataset.type) {
                dropIn(curDrag, zone);
            } else {
                /* вернуть на место */
                curDrag.style.position = 'static';
                curDrag.style.width    = 'auto';
                curDrag.style.height   = 'auto';
                curDrag.style.opacity  = '1';
                if (origNext) origParent.insertBefore(curDrag, origNext);
                else origParent.appendChild(curDrag);
            }
            curDrag = null;
        }

        function moveAt(x, y, w, h) {
            curDrag.style.left = (x - w / 2) + 'px';
            curDrag.style.top  = (y - h / 2) + 'px';
        }

        function dropIn(el, zone) {
            const content = document.getElementById(zone.id + '-content');
            const icon = document.createElement('div');
            icon.style.cssText = 'font-size:clamp(20px,4vw,32px);animation:bounce 0.6s';
            icon.textContent = el.querySelector('.item-icon').textContent;
            content.appendChild(icon);
            el.remove();
            score++;
            if (score === itemsData.length) {
                const modal = document.getElementById('success-modal');
                modal.style.display = 'flex';
            }
        }

        document.querySelectorAll('.drop-zone').forEach(z => {
            z.ondragover  = e => { e.preventDefault(); z.classList.add('active'); };
            z.ondragleave = () => z.classList.remove('active');
            z.ondrop = e => {
                z.classList.remove('active');
                const name = e.dataTransfer.getData('text');
                const el   = document.querySelector(`[data-name="${name}"]`);
                if (el && el.dataset.type === z.dataset.type) dropIn(el, z);
            };
        });
    </script>
</body>
</html>
